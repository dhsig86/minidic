<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossário ORL</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>👂 Mini Glossário de Otorrinolaringologia</h1>
        <p>Para médicos e pacientes curiosos</p>
        <input type="text" id="search" placeholder="Buscar doença ou sintoma..." autocomplete="off">
    </header>
    <main>
        <div id="category-filters">
            <button class="filter-btn active" data-filter="all">Todos</button>
            <button class="filter-btn" data-filter="nariz">Nariz</button>
            <button class="filter-btn" data-filter="garganta">Garganta/Faringe</button>
            <button class="filter-btn" data-filter="laringe">Laringe</button>
            <button class="filter-btn" data-filter="ouvido">Ouvido</button>
        </div>
        <div id="cards-container"></div>
    </main>
    <footer>
        <p>Baseado em dados médicos – uso informativo . FREE USE 2026 DR. DARIO HART </p>
    </footer>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
